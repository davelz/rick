<!DOCTYPE html>
<html>
<head>
</head>
<body>
   <video id="myVideoPlayer" width="640" heigth="480" controls></video>
   <script src="http://localhost/dash.all.min.js"></script>
   <script>
    document.addEventListener("DOMContentLoaded", function () {
        // 1. The URL of your DASH manifest (.mpd file)
        var url = "http://localhost:8080/output.mpd";
        
        // 2. Get the video element from the DOM
        var videoElement = document.querySelector("#myVideoPlayer");
        
        // 3. Create a MediaPlayer instance
        var player = dashjs.MediaPlayer().create();
        
        // 4. Initialize the player with the video element and manifest url
        player.initialize(videoElement, url, true);
    });
  </script>
</body>
</html>
